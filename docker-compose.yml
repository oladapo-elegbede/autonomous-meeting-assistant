# ============================================================
# Local Development Environment
# ============================================================
# Starts PostgreSQL (with pgvector) and Redis for local dev.
#
# Usage:
#   docker compose up -d        Start in background
#   docker compose down         Stop and remove containers
#   docker compose logs -f      Tail logs from all services
# ============================================================

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: meeting_assistant_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: meeting_assistant
      POSTGRES_PASSWORD: local_dev_password
      POSTGRES_DB: meeting_assistant_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U meeting_assistant -d meeting_assistant_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: meeting_assistant_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local